spring:
  main:
    banner-mode: off
  jpa:
    hibernate.ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        show_sql: false
      jdbc.time_zone: UTC
  sql:
    init.mode: always
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/analyzer
    username: user
    password: 12345

grpc:
  client:
    hub-router:
      address: 'static://localhost:59090'
      enableKeepAlive: true
      keepAliveWithoutCalls: true
      negotiationType: plaintext

kafka:
  bootstrap-servers: localhost:9092
  client.id: telemetry.analyzer
  topics:
    hubs-events: telemetry.hubs.v1
    snapshots: telemetry.snapshots.v1
  consumer:
    properties:
      group:
        hub: AnalyzerHubGroup
        snapshot: AnalyzerSnapshotGroup
      consume.attempt.timeout.ms: 500
      auto-offset-reset: earliest
      enable-auto-commit: false
    hub-event-consumer:
      key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value.deserializer: ru.yandex.practicum.kafka.serde.HubEventDeserializer
    snapshot-consumer:
      key.deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value.deserializer: ru.yandex.practicum.kafka.serde.SnapshotDeserializer

logging:
  level:
    org:
      apache.kafka: ERROR
      springframework:
        orm.jpa: INFO
        transaction: INFO